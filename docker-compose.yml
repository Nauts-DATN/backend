name: nauts-compose
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - nauts_net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_PUBLIC_URL:-http://localhost:9001}
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - nauts_net

  backend:
    image: nauts-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/eduai
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      - mongo
      - minio
    networks:
      - nauts_net

  web:
    image: nauts-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - nauts_net

networks:
  nauts_net:
    driver: bridge

volumes:
  mongo_data:
  minio_data:
